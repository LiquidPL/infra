apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-media
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: '-50'
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10-standard-trixie@sha256:0672b63296ff64d0911598ae0680d433ebbffd17d22c3bd04cb5b383fb808d0d
  storage:
    storageClass: topolvm-provisioner
    size: 1Gi
  postgresql:
    parameters:
      shared_buffers: '128MB'
      min_wal_size: '10MB' # scaled down from the default of 80 (80 / 8 = 10)
      max_wal_size: '128MB' # scaled down from the default of 1024 (1024 / 8 = 128)
      wal_keep_size: '64MB' # 32 WAL segments * 2MB segment size = 64MB
    synchronous:
      method: any
      number: 1
  bootstrap:
    initdb:
      walSegmentSize: 2 # default is 16
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 512Mi
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: minio-homelab
