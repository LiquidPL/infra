apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: apps-luna
  labels:
    name: sealed-secrets
spec:
  project: luna
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  sources:
    - chart: sealed-secrets
      repoURL: docker.io/bitnamicharts
      targetRevision: 2.19.1
      helm:
        valuesObject:
          fullnameOverride: sealed-secrets-controller
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 64Mi
  syncPolicy:
    automated:
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 3
    syncOptions:
      - CreateNamespace=true
